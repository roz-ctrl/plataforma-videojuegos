# ============================================================
#  Microservicio: PAGOS / TRANSACCIONES  (puerto 8086)
# ============================================================
spring.application.name=pagos-service
server.port=8086

spring.datasource.url=jdbc:mysql://localhost:3306/pagos_db?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always


# ----- URLs de microservicios remotos -----
servicios.usuarios.url=http://localhost:8081
servicios.carrito.url=http://localhost:8085
servicios.biblioteca.url=http://localhost:8087

spring.cloud.openfeign.client.config.default.connectTimeout=3000
spring.cloud.openfeign.client.config.default.readTimeout=5000

logging.level.com.videojuegos=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
