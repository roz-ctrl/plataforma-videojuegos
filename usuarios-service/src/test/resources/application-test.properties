# ============================================================
#  Perfil de TEST - usa H2 en memoria (no toca MySQL)
#  Se activa con @ActiveProfiles("test") en las pruebas de repositorio.
# ============================================================
spring.datasource.url=jdbc:h2:mem:usuarios_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# No ejecutar data.sql (es sintaxis MySQL) durante los tests
spring.sql.init.mode=never
