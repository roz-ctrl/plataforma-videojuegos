# ============================================================
#  Microservicio: USUARIOS  (puerto 8081)
# ============================================================
spring.application.name=usuarios-service
server.port=8081

# ----- Datasource MySQL (Laragon) -----
spring.datasource.url=jdbc:mysql://localhost:3306/usuarios_db?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# ----- JPA / Hibernate -----
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Ejecuta data.sql despues de crear el esquema con Hibernate
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always


# ----- Logs -----
logging.level.com.videojuegos=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
